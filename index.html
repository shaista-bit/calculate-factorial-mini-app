<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div id="container" class="border-radius">
        <div class="margin" id="facto">
            <h1>Factorial Calculator</h1>
        </div>
        <div  class="margin">Enter positive integer number (Max 10)</div><br>
        <input class="margin border-radius height border padding" type="number" placeholder="Enter the number">
        <input id="result" class="margin border-radius height border padding" type="number" placeholder="Result">
        <div class="margin">
            <button class="width border-radius height" id="bgcolor">Calculate </button>
            <button class="width border-radius height border margin" id="clear">Clear</button>
        </div>
    </div>


    <script src="index.js"></script>
</body>

</html>
